      #    # Não usamos 'build:', pois queremos o servidor de desenvolvimento
      #    image: node:18-alpine
      #    working_dir: /app
      #    volumes:
      #      # Monta todo o código do frontend dentro do /app no container
      #      - ./frontend:/app
      #    ports:
