services:
  # Serviço do Backend (Python) - Sem mudanças
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code/app
    networks:
      - vivid-pixel-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./.env

  # Serviço do Frontend (Next.js) - Atualizado
  frontend:
    # Não usamos 'build:', pois queremos o servidor de desenvolvimento
    working_dir: /app
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    entrypoint: [ "/bin/sh", "-c", "cd /app && npm run dev" ]
    volumes:
      # Monta todo o codigo do frontend dentro do /app no container
      - ${PROJECT_ROOT:-./}/frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      # O servidor 'npm run dev' roda na porta 3000
      - "3000:3000"
    command: npm run dev
    env_file:
      - ./.env
    depends_on:
      - backend
    networks:
      - vivid-pixel-network
    environment:
      - BACKEND_API_URL=http://backend:8000
      # Esta é a URL que o 'next.config.js' (em 'rewrites') usará.
      # 'http://backend:800version: '3.8'
